[[cards]]
id = "a1b2c3d4-e5f6-7890-abcd-ef0123456031"
front = "时间复杂度 O(log n) 的典型算法有哪些？"
back = "1. 二分查找\n2. 二叉搜索树的查找/插入/删除\n3. 堆操作（插入/删除）\n4. 欧几里得算法（求最大公约数）\n特征：每次操作将问题规模减半。"
tags = ["算法", "时间复杂度"]
custom = {}
created_at = "2025-01-01T00:00:00Z"
modified_at = "2025-01-01T00:00:00Z"

[[cards]]
id = "a1b2c3d4-e5f6-7890-abcd-ef0123456032"
front = "什么是哈希表？如何解决哈希冲突？"
back = "哈希表是通过哈希函数将 key 映射到 value 的数据结构，平均查找/插入/删除时间复杂度为 O(1)。\n解决冲突的方法：\n1. 链地址法（拉链法）：每个桶是一个链表\n2. 开放地址法：线性探测、二次探测、双重哈希"
tags = ["数据结构", "哈希表"]
custom = {}
created_at = "2025-01-01T00:00:00Z"
modified_at = "2025-01-01T00:00:00Z"

[[cards]]
id = "a1b2c3d4-e5f6-7890-abcd-ef0123456033"
front = "快速排序的时间复杂度和空间复杂度？"
back = "平均时间复杂度：O(n log n)\n最坏时间复杂度：O(n²)（已排序数组且选首元素为 pivot）\n空间复杂度：O(log n)（递归栈）\n快速排序是不稳定的排序算法。"
tags = ["算法", "排序"]
custom = {}
created_at = "2025-01-01T00:00:00Z"
modified_at = "2025-01-01T00:00:00Z"

[[cards]]
id = "a1b2c3d4-e5f6-7890-abcd-ef0123456034"
front = "什么是 B+ 树？为什么数据库索引使用它？"
back = "B+ 树是一种多路平衡搜索树，所有数据都存储在叶子节点，叶子节点之间通过链表连接。\n数据库使用 B+ 树的原因：\n1. 树高度低，减少磁盘 I/O\n2. 范围查询效率高（叶子节点链表）\n3. 磁盘块对齐，充分利用局部性"
tags = ["数据结构", "B+树", "数据库"]
custom = {}
created_at = "2025-01-01T00:00:00Z"
modified_at = "2025-01-01T00:00:00Z"

[[cards]]
id = "a1b2c3d4-e5f6-7890-abcd-ef0123456035"
front = "什么是动态规划？"
back = "动态规划是解决具有重叠子问题和最优子结构性质的问题的方法。\n核心思想：将大问题分解为小问题，记录小问题的解避免重复计算。\n实现方式：自顶向下（记忆化搜索）或自底向上（填表法）。"
tags = ["算法", "动态规划"]
custom = {}
created_at = "2025-01-01T00:00:00Z"
modified_at = "2025-01-01T00:00:00Z"

[[cards]]
id = "a1b2c3d4-e5f6-7890-abcd-ef0123456036"
front = "什么是红黑树？"
back = "红黑树是一种自平衡二叉搜索树，每个节点有一个颜色属性（红或黑）。\n性质：\n1. 节点是红色或黑色\n2. 根是黑色\n3. 红色节点的子节点必须是黑色\n4. 从任意节点到其叶子的路径上黑色节点数相同\n保证最坏情况下 O(log n) 的查找时间。"
tags = ["数据结构", "红黑树"]
custom = {}
