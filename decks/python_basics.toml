[[cards]]
id = "a1b2c3d4-e5f6-7890-abcd-ef0123456021"
front = "Python 中 list 和 tuple 的区别？"
back = "list 是可变的（mutable），使用 [] 定义；tuple 是不可变的（immutable），使用 () 定义。\ntuple 可以作为字典的 key，而 list 不行。\ntuple 在内存中更节省空间。"
tags = ["Python", "数据结构"]
custom = {}
created_at = "2025-01-01T00:00:00Z"
modified_at = "2025-01-01T00:00:00Z"

[[cards]]
id = "a1b2c3d4-e5f6-7890-abcd-ef0123456022"
front = "什么是装饰器（Decorator）？"
back = "装饰器是一个接受函数作为参数并返回新函数的可调用对象，用于在不修改原函数代码的情况下增强其功能。\n使用 @ 语法糖应用装饰器。"
tags = ["Python", "装饰器"]
custom = {}
created_at = "2025-01-01T00:00:00Z"
modified_at = "2025-01-01T00:00:00Z"

[[cards]]
id = "a1b2c3d4-e5f6-7890-abcd-ef0123456023"
front = "Python 中的 GIL 是什么？"
back = "GIL（Global Interpreter Lock）是 CPython 解释器中的一个互斥锁，确保同一时刻只有一个线程执行 Python 字节码。\n这意味着 Python 的多线程在 CPU 密集型任务中无法真正并行，但在 I/O 密集型任务中仍然有效。"
tags = ["Python", "GIL", "多线程"]
custom = {}
created_at = "2025-01-01T00:00:00Z"
modified_at = "2025-01-01T00:00:00Z"

[[cards]]
id = "a1b2c3d4-e5f6-7890-abcd-ef0123456024"
front = "什么是生成器（Generator）？"
back = "生成器是使用 yield 关键字的函数，返回一个迭代器。\n每次调用 next() 时，生成器从上次离开的位置恢复执行，节省内存。\n适合处理大数据流或无限序列。"
tags = ["Python", "生成器", "迭代器"]
custom = {}
created_at = "2025-01-01T00:00:00Z"
modified_at = "2025-01-01T00:00:00Z"

[[cards]]
id = "a1b2c3d4-e5f6-7890-abcd-ef0123456025"
front = "Python 中的深拷贝和浅拷贝有什么区别？"
back = "浅拷贝（copy.copy）只拷贝对象本身，不拷贝嵌套的子对象，新旧对象共享子对象引用。\n深拷贝（copy.deepcopy）递归拷贝对象及其所有子对象，完全独立。"
tags = ["Python", "拷贝"]
custom = {}
created_at = "2025-01-01T00:00:00Z"
modified_at = "2025-01-01T00:00:00Z"

[[cards]]
id = "a1b2c3d4-e5f6-7890-abcd-ef0123456026"
front = "Python 的 with 语句的作用？"
back = "with 语句用于上下文管理，确保在进入和退出代码块时自动执行设置和清理操作。\n常用于文件操作、锁获取释放等场景，等价于 try/finally 块。"
tags = ["Python", "上下文管理器"]
custom = {}
created_at = "2025-01-01T00:00:00Z"
modified_at = "2025-01-01T00:00:00Z"

[[cards]]
id = "a1b2c3d4-e5f6-7890-abcd-ef0123456027"
front = "什么是列表推导式？"
back = "列表推导式是一种简洁的创建列表的语法：[expression for item in iterable if condition]。\n比等价的 for 循环更快、更简洁、更具可读性。"
