name: Validate Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to validate"
        required: false
        type: string

jobs:
  validate-version:
    name: Validate Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.1.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Validating version: $VERSION"

      - name: Check root Cargo.toml
        run: |
          ROOT_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Root version: $ROOT_VERSION"
          if [ "$ROOT_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Root Cargo.toml version ($ROOT_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Check ankitui-core Cargo.toml
        run: |
          CORE_VERSION=$(grep -m1 '^version = ' ankitui-core/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "ankitui-core version: $CORE_VERSION"
          if [ "$CORE_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::ankitui-core Cargo.toml version ($CORE_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Check ankitui-tui Cargo.toml
        run: |
          TUI_VERSION=$(grep -m1 '^version = ' ankitui-tui/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "ankitui-tui version: $TUI_VERSION"
          if [ "$TUI_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::ankitui-tui Cargo.toml version ($TUI_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Check ankitui Cargo.toml
        run: |
          APP_VERSION=$(grep -m1 '^version = ' ankitui/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "ankitui version: $APP_VERSION"
          if [ "$APP_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::ankitui Cargo.toml version ($APP_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Verify all versions match
        run: |
          echo "All Cargo.toml versions match tag ${{ steps.version.outputs.version }}"

  validate-changelog:
    name: Validate Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.1.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check CHANGELOG.md exists
        run: |
          if [ ! -f "CHANGELOG.md" ]; then
            echo "::warning::CHANGELOG.md not found - skipping changelog validation"
            exit 0
          fi

      - name: Check version in changelog
        if: hashFiles('CHANGELOG.md') != ''
        run: |
          if ! grep -q "${{ steps.version.outputs.version }}" CHANGELOG.md; then
            echo "::warning::Version ${{ steps.version.outputs.version }} not found in CHANGELOG.md"
          else
            echo "Version found in CHANGELOG.md"
          fi

  validate-build:
    name: Validate Build
    runs-on: ubuntu-latest
    needs: [validate-version]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Build release binary
        run: cargo build --release

      - name: Verify binary
        run: |
          if [ -f "target/release/ankitui" ]; then
            echo "Binary built successfully"
            ./target/release/ankitui --version || true
          else
            echo "::error::Binary not found after build"
            exit 1
          fi
