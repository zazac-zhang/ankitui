name: Build and Release Packages

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (leave empty for git tag)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build and test on all platforms
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}

    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Run tests
      run: cargo test --verbose

  # Build Linux packages
  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        targets: x86_64-unknown-linux-gnu

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libsqlite3-dev \
          build-essential \
          dpkg-dev \
          fakeroot \
          ruby \
          ruby-dev

    - name: Install cargo-deb
      run: cargo install cargo-deb

    - name: Install fpm
      run: gem install fpm

    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Determine version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        elif [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="0.1.0"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Build release binary
      run: cargo build --release

    - name: Build DEB package
      run: cargo deb --no-strip

    - name: Build RPM package
      run: |
        cargo install cargo-generate-rpm
        cargo generate-rpm

    - name: Build tarball
      run: |
        mkdir -p dist
        scripts/build-all.sh --source-only
        tar -czf "dist/ankitui-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz" \
          -C target/release ankitui \
          README.md LICENSE scripts/install.sh scripts/uninstall.sh

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v3
      with:
        name: linux-packages
        path: |
          target/debian/*.deb
          target/generate-rpm/*.rpm
          dist/*.tar.gz
        retention-days: 30

  # Build macOS packages
  build-macos:
    name: Build macOS Packages
    runs-on: macos-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        targets: x86_64-apple-darwin,aarch64-apple-darwin

    - name: Install create-dmg
      run: brew install create-dmg

    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Determine version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        elif [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="0.1.0"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Build release binary (x86_64)
      run: cargo build --release --target x86_64-apple-darwin

    - name: Build release binary (ARM64)
      run: cargo build --release --target aarch64-apple-darwin

    - name: Create universal binary
      run: |
        mkdir -p target/release-universal
        lipo -create \
          target/x86_64-apple-darwin/release/ankitui \
          target/aarch64-apple-darwin/release/ankitui \
          -output target/release-universal/ankitui

    - name: Build macOS packages
      run: |
        export VERSION="${{ steps.version.outputs.version }}"
        mkdir -p dist
        tar -czf "dist/ankitui-${VERSION}-macos-universal.tar.gz" \
          -C target/release-universal ankitui \
          README.md LICENSE scripts/install.sh scripts/uninstall.sh

    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v3
      with:
        name: macos-packages
        path: dist/*.tar.gz
        retention-days: 30

  # Build Windows packages
  build-windows:
    name: Build Windows Packages
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        targets: x86_64-pc-windows-msvc

    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Determine version
      id: version
      run: |
        if ("${{ github.event.inputs.version }}" -ne "") {
          $VERSION = "${{ github.event.inputs.version }}"
        } elseif ("${{ github.ref }}" -match "refs/tags/v(.+)") {
          $VERSION = $matches[1]
        } else {
          $VERSION = "0.1.0"
        }
        echo "version=$VERSION" >> $env:GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Build release binary
      run: cargo build --release

    - name: Create Windows package
      run: |
        $VERSION = "${{ steps.version.outputs.version }}"
        mkdir dist
        tar -czf "dist/ankitui-$VERSION-windows-x86_64.tar.gz" `
          -C target/release ankitui.exe `
          README.md LICENSE scripts/install.sh scripts/uninstall.sh

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v3
      with:
        name: windows-packages
        path: dist/*.tar.gz
        retention-days: 30

  # Create source package
  build-source:
    name: Build Source Package
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create source package
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        if [ -z "$VERSION" ]; then
          VERSION="0.1.0"
        fi
        mkdir -p dist
        tar -czf "dist/ankitui-$VERSION-source.tar.gz" \
          --exclude='.git' \
          --exclude='target' \
          --exclude='dist' \
          --exclude='.github' \
          --exclude='temp-*' \
          .

    - name: Upload source package
      uses: actions/upload-artifact@v3
      with:
        name: source-package
        path: dist/*.tar.gz
        retention-days: 30

  # Create release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, build-source]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
    - name: Determine version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        elif [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="0.1.0"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: AnkiTUI v${{ steps.version.outputs.version }}
        body: |
          ## AnkiTUI ${{ steps.version.outputs.version }}

          A terminal-based spaced repetition learning system compatible with Anki's SM-2 algorithm.

          ### Installation

          #### Linux
          - **DEB Package (Debian/Ubuntu)**: Download `.deb` file and install with `sudo dpkg -i ankitui_*.deb`
          - **RPM Package (Fedora/CentOS)**: Download `.rpm` file and install with `sudo rpm -i ankitui-*.rpm`
          - **Tarball**: Extract and run `sudo ./install.sh`

          #### macOS
          - **Universal Binary**: Download the macOS tarball, extract and run `sudo ./install.sh`

          #### Windows
          - **Windows Binary**: Download the Windows tarball, extract and run `install.sh` (in Git Bash/WSL) or manually copy `ankitui.exe`

          #### Source
          - **Source Code**: Download source tarball, install Rust, and run `cargo build --release`

          ### Verification

          All packages include checksums for verification:
          - `SHA256SUMS`: SHA256 checksums
          - `MD5SUMS`: MD5 checksums (legacy)

          ### What's Changed

          See the [CHANGELOG](https://github.com/your-username/ankitui/blob/main/CHANGELOG.md) for detailed changes.

          ### Support

          - 📖 [Documentation](https://docs.ankitui.com)
          - 🐛 [Report Issues](https://github.com/your-username/ankitui/issues)
          - 💬 [Discussions](https://github.com/your-username/ankitui/discussions)

          Thank you for using AnkiTUI! 🎓
        files: |
          target/debian/*.deb
          target/generate-rpm/*.rpm
          dist/*.tar.gz
        draft: false
        prerelease: false
        generate_release_notes: true

  
  # Security scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run cargo audit
      run: |
        cargo install cargo-audit
        cargo audit

    - name: Run cargo deny
      run: |
        cargo install cargo-deny
        cargo deny check

    - name: Upload security scan results
      uses: actions/upload-artifact@v3
      with:
        name: security-scan-results
        path: |
          Cargo.advisory-db
          advisory-db
        retention-days: 30