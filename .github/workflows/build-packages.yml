name: Build and Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (leave empty for git tag)"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build Linux packages
  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsqlite3-dev \
            build-essential

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.1.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build release binary
        run: cargo build --release

      - name: Create Linux tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          tar -czf "dist/ankitui-${VERSION}-linux-x86_64.tar.gz" \
            -C target/release ankitui

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*.tar.gz
          retention-days: 30

  # Build macOS packages
  build-macos:
    name: Build macOS Packages
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.1.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build release binary (x86_64)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build release binary (ARM64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/release-universal
          lipo -create \
            target/x86_64-apple-darwin/release/ankitui \
            target/aarch64-apple-darwin/release/ankitui \
            -output target/release-universal/ankitui

      - name: Create macOS tarball
        run: |
          export VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          tar -czf "dist/ankitui-${VERSION}-macos-universal.tar.gz" \
            -C target/release-universal ankitui

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: dist/*.tar.gz
          retention-days: 30

  # Build Windows packages
  build-windows:
    name: Build Windows Packages
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Determine version
        id: version
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $VERSION = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref }}" -match "refs/tags/v(.+)") {
            $VERSION = $matches[1]
          } else {
            $VERSION = "0.1.0"
          }
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build release binary
        run: cargo build --release

      - name: Create Windows package
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          mkdir dist
          tar -czf "dist/ankitui-$VERSION-windows-x86_64.tar.gz" `
            -C target/release ankitui.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist/*.tar.gz
          retention-days: 30

  # Create release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.1.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: AnkiTUI v${{ steps.version.outputs.version }}
          body: |
            ## AnkiTUI ${{ steps.version.outputs.version }}

            A terminal-based spaced repetition learning system compatible with Anki's SM-2 algorithm.

            ### Downloads

            - **Linux**: `ankitui-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz`
            - **macOS (Universal)**: `ankitui-${{ steps.version.outputs.version }}-macos-universal.tar.gz`
            - **Windows**: `ankitui-${{ steps.version.outputs.version }}-windows-x86_64.tar.gz`

            ### Installation

            Extract the archive for your platform and run the `ankitui` binary.

            ### Support

            - Report issues: ${{ github.server_url }}/${{ github.repository }}/issues
          generate_release_notes: true
          files: |
            linux-packages/*.tar.gz
            macos-packages/*.tar.gz
            windows-packages/*.tar.gz
